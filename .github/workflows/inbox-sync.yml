name: Projekt-Inbox Sync

on:
  push:
    branches: [main, master]
    paths:
      - 'inbox-auto-sync/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inbox-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Inbox → Zielordner
        env:
          SKIP_VPS: "1"
        run: bash scripts/inbox-sync-here.sh
